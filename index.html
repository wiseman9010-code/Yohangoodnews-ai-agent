<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日好消息 · Daily Good News</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#FFB87A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日好消息">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --cream:#FFF9F0;
    --warm-white:#FFFCF7;
    --peach:#FFDAB3;
    --soft-orange:#FFB87A;
    --blush:#FFD1DC;
    --lavender:#E8D5F5;
    --sage:#D4E7D0;
    --sky:#D6EAF8;
    --gold:#F5C542;
    --text-primary:#4A3728;
    --text-secondary:#7A6455;
    --text-light:#A8917E;
    --card-bg:#FFFFFF;
    --shadow:0 4px 24px rgba(120,80,40,0.08);
    --shadow-hover:0 8px 40px rgba(120,80,40,0.14);
    --radius:20px;
    --radius-sm:12px;
  }
  html{scroll-behavior:smooth;font-size:16px}
  body{
    font-family:'Noto Serif SC','Quicksand',serif;
    background:var(--cream);
    color:var(--text-primary);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ========== FLOATING BACKGROUND ELEMENTS ========== */
  .bg-canvas{
    position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  }
  .cloud{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.35;
    animation:floatCloud linear infinite;
  }
  .cloud-1{width:300px;height:200px;background:var(--peach);top:10%;left:-5%;animation-duration:45s}
  .cloud-2{width:250px;height:180px;background:var(--blush);top:30%;right:-8%;animation-duration:55s;animation-delay:-10s}
  .cloud-3{width:350px;height:220px;background:var(--lavender);top:60%;left:10%;animation-duration:50s;animation-delay:-20s}
  .cloud-4{width:200px;height:160px;background:var(--sage);top:80%;right:15%;animation-duration:60s;animation-delay:-5s}
  .cloud-5{width:280px;height:190px;background:var(--sky);top:5%;right:30%;animation-duration:48s;animation-delay:-15s}
  @keyframes floatCloud{
    0%{transform:translateX(0) translateY(0)}
    25%{transform:translateX(80px) translateY(-30px)}
    50%{transform:translateX(40px) translateY(40px)}
    75%{transform:translateX(-60px) translateY(-20px)}
    100%{transform:translateX(0) translateY(0)}
  }

  /* ========== LOADING SCREEN ========== */
  .loading-screen{
    position:fixed;inset:0;z-index:9999;
    background:linear-gradient(135deg,#FFF5E6,#FFE8D6,#FFD6C4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity 0.8s ease,visibility 0.8s ease;
  }
  .loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .loading-sun{
    width:80px;height:80px;
    background:radial-gradient(circle,#FFD93D,#FF9A3C);
    border-radius:50%;
    position:relative;
    animation:pulse 1.5s ease-in-out infinite;
  }
  .loading-sun::before{
    content:'';position:absolute;inset:-15px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,217,61,0.3),transparent 70%);
    animation:glow 1.5s ease-in-out infinite alternate;
  }
  .loading-rays{
    position:absolute;inset:-30px;
    animation:spin 8s linear infinite;
  }
  .loading-rays span{
    position:absolute;
    width:3px;height:18px;
    background:linear-gradient(to bottom,#FFD93D,transparent);
    border-radius:2px;
    left:50%;top:0;
    transform-origin:50% calc(40px + 30px);
  }
  .loading-rays span:nth-child(1){transform:rotate(0deg)}
  .loading-rays span:nth-child(2){transform:rotate(45deg)}
  .loading-rays span:nth-child(3){transform:rotate(90deg)}
  .loading-rays span:nth-child(4){transform:rotate(135deg)}
  .loading-rays span:nth-child(5){transform:rotate(180deg)}
  .loading-rays span:nth-child(6){transform:rotate(225deg)}
  .loading-rays span:nth-child(7){transform:rotate(270deg)}
  .loading-rays span:nth-child(8){transform:rotate(315deg)}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes glow{0%{opacity:0.5;transform:scale(1)}100%{opacity:1;transform:scale(1.2)}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  .loading-text{
    margin-top:32px;
    font-family:'ZCOOL XiaoWei',serif;
    font-size:1.2rem;
    color:var(--text-secondary);
    letter-spacing:4px;
    animation:fadeText 2s ease-in-out infinite;
  }
  @keyframes fadeText{0%,100%{opacity:0.5}50%{opacity:1}}

  /* ========== MAIN WRAPPER ========== */
  .main-wrapper{position:relative;z-index:1}

  /* ========== HERO / GREETING ========== */
  .hero{
    padding:60px 24px 40px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .hero-bg{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,218,179,0.4) 0%,rgba(255,249,240,0) 100%);
    z-index:0;
  }
  .hero-content{position:relative;z-index:1;max-width:640px;margin:0 auto}
  .greeting-icon{
    font-size:3rem;
    margin-bottom:12px;
    display:inline-block;
    animation:wave 2.5s ease-in-out infinite;
  }
  @keyframes wave{
    0%,100%{transform:rotate(0deg)}
    15%{transform:rotate(14deg)}
    30%{transform:rotate(-8deg)}
    40%{transform:rotate(10deg)}
    50%{transform:rotate(0deg)}
  }
  .greeting-text{
    font-family:'ZCOOL XiaoWei',serif;
    font-size:clamp(2rem,5vw,3rem);
    color:var(--text-primary);
    margin-bottom:8px;
    line-height:1.3;
  }
  .greeting-sub{
    font-size:0.95rem;
    color:var(--text-secondary);
    margin-bottom:20px;
  }
  .quote-card{
    display:inline-block;
    background:linear-gradient(135deg,rgba(255,255,255,0.85),rgba(255,255,255,0.6));
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,200,150,0.3);
    border-radius:var(--radius);
    padding:20px 32px;
    max-width:520px;
    position:relative;
  }
  .quote-mark{
    position:absolute;top:-8px;left:16px;
    font-size:3rem;line-height:1;
    color:var(--soft-orange);
    opacity:0.4;
    font-family:Georgia,serif;
  }
  .quote-text{
    font-size:1.05rem;
    line-height:1.8;
    color:var(--text-primary);
    font-style:italic;
  }
  .quote-author{
    margin-top:8px;
    font-size:0.82rem;
    color:var(--text-light);
  }
  .date-badge{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:20px;
    background:rgba(255,255,255,0.7);
    border-radius:30px;
    padding:8px 20px;
    font-size:0.85rem;
    color:var(--text-secondary);
    border:1px solid rgba(200,170,140,0.2);
  }

  /* ========== TABS ========== */
  .tabs-section{
    max-width:900px;margin:0 auto;padding:0 24px;
  }
  .tabs-row{
    display:flex;gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:32px;
  }
  .tab-btn{
    display:flex;align-items:center;gap:8px;
    padding:12px 24px;
    border:2px solid transparent;
    border-radius:50px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(6px);
    font-family:'Noto Serif SC',serif;
    font-size:0.95rem;
    color:var(--text-secondary);
    cursor:pointer;
    transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
    white-space:nowrap;
  }
  .tab-btn:hover{
    background:rgba(255,255,255,0.95);
    transform:translateY(-2px);
    box-shadow:var(--shadow);
  }
  .tab-btn.active{
    border-color:var(--soft-orange);
    background:#fff;
    color:var(--text-primary);
    box-shadow:var(--shadow);
    font-weight:600;
  }
  .tab-icon{font-size:1.2rem}

  /* ========== NEWS CARDS ========== */
  .cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(min(100%,380px),1fr));
    gap:20px;
    padding-bottom:40px;
  }
  .news-card{
    background:var(--card-bg);
    border-radius:var(--radius);
    padding:28px;
    box-shadow:var(--shadow);
    transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(20px);
    animation:cardIn 0.5s ease forwards;
    border:1px solid rgba(200,170,140,0.1);
  }
  .news-card:nth-child(1){animation-delay:0.05s}
  .news-card:nth-child(2){animation-delay:0.1s}
  .news-card:nth-child(3){animation-delay:0.15s}
  .news-card:nth-child(4){animation-delay:0.2s}
  .news-card:nth-child(5){animation-delay:0.25s}
  .news-card:nth-child(6){animation-delay:0.3s}
  .news-card:nth-child(7){animation-delay:0.35s}
  .news-card:nth-child(8){animation-delay:0.4s}
  @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
  .news-card:hover{
    transform:translateY(-6px);
    box-shadow:var(--shadow-hover);
  }
  .news-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    border-radius:var(--radius) var(--radius) 0 0;
  }
  .news-card[data-cat="warmth"]::before{background:linear-gradient(90deg,#FF9A9E,#FAD0C4)}
  .news-card[data-cat="tech"]::before{background:linear-gradient(90deg,#A8C0FF,#3F86ED)}
  .news-card[data-cat="culture"]::before{background:linear-gradient(90deg,#D4A5FF,#9B59B6)}
  .card-cat-badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:0.75rem;
    padding:4px 12px;
    border-radius:20px;
    margin-bottom:12px;
    font-weight:600;
  }
  .news-card[data-cat="warmth"] .card-cat-badge{background:#FFF0F0;color:#D94F5C}
  .news-card[data-cat="tech"] .card-cat-badge{background:#EDF2FF;color:#3F6FED}
  .news-card[data-cat="culture"] .card-cat-badge{background:#F5EDFF;color:#7E3BAB}
  .card-title{
    font-size:1.1rem;
    font-weight:700;
    line-height:1.6;
    margin-bottom:10px;
    color:var(--text-primary);
  }
  .card-summary{
    font-size:0.9rem;
    line-height:1.75;
    color:var(--text-secondary);
    margin-bottom:14px;
  }
  .card-comment{
    background:linear-gradient(135deg,#FFF8F0,#FFF2E8);
    border-radius:var(--radius-sm);
    padding:14px 16px;
    margin-bottom:14px;
    position:relative;
  }
  .card-comment::before{
    content:'💬';
    position:absolute;top:-10px;left:12px;
    font-size:1.1rem;
  }
  .card-comment p{
    font-size:0.85rem;
    color:var(--text-secondary);
    line-height:1.7;
    font-style:italic;
  }
  .card-footer{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:8px;
  }
  .card-source{
    font-size:0.78rem;
    color:var(--text-light);
    display:flex;align-items:center;gap:4px;
  }
  .card-link{
    font-size:0.82rem;
    color:var(--soft-orange);
    text-decoration:none;
    font-weight:600;
    padding:6px 14px;
    border-radius:20px;
    border:1.5px solid var(--soft-orange);
    transition:all 0.3s ease;
    white-space:nowrap;
  }
  .card-link:hover{
    background:var(--soft-orange);
    color:#fff;
  }

  /* ========== MOOD WIDGET ========== */
  .mood-section{
    max-width:600px;margin:20px auto 40px;padding:0 24px;
  }
  .mood-card{
    background:linear-gradient(135deg,rgba(255,255,255,0.9),rgba(255,245,230,0.9));
    backdrop-filter:blur(10px);
    border-radius:var(--radius);
    padding:32px;
    text-align:center;
    box-shadow:var(--shadow);
    border:1px solid rgba(200,170,140,0.15);
  }
  .mood-title{
    font-family:'ZCOOL XiaoWei',serif;
    font-size:1.3rem;
    color:var(--text-primary);
    margin-bottom:6px;
  }
  .mood-sub{
    font-size:0.85rem;
    color:var(--text-light);
    margin-bottom:20px;
  }
  .mood-options{
    display:flex;gap:12px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .mood-btn{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:14px 18px;
    border:2px solid transparent;
    border-radius:16px;
    background:rgba(255,255,255,0.8);
    cursor:pointer;
    transition:all 0.35s ease;
    min-width:80px;
  }
  .mood-btn:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 6px 20px rgba(120,80,40,0.1);
  }
  .mood-btn.selected{
    border-color:var(--gold);
    background:#FFFBEB;
    box-shadow:0 4px 16px rgba(245,197,66,0.25);
  }
  .mood-emoji{font-size:2rem}
  .mood-label{font-size:0.78rem;color:var(--text-secondary);font-weight:600}
  .mood-thanks{
    margin-top:16px;
    font-size:0.9rem;
    color:var(--soft-orange);
    opacity:0;
    transition:opacity 0.5s ease;
    height:24px;
  }
  .mood-thanks.show{opacity:1}

  /* ========== REFRESH FAB ========== */
  .fab-refresh{
    position:fixed;
    bottom:32px;right:32px;
    z-index:100;
    width:60px;height:60px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#FFB87A,#FF9A5C);
    color:#fff;
    font-size:1.5rem;
    cursor:pointer;
    box-shadow:0 6px 24px rgba(255,150,80,0.4);
    transition:all 0.35s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .fab-refresh:hover{
    transform:scale(1.1) rotate(30deg);
    box-shadow:0 8px 32px rgba(255,150,80,0.5);
  }
  .fab-refresh:active{transform:scale(0.95)}
  .fab-refresh.spinning svg{animation:fabSpin 0.8s ease}
  @keyframes fabSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

  /* ========== FOOTER ========== */
  .site-footer{
    text-align:center;
    padding:40px 24px 60px;
    font-size:0.8rem;
    color:var(--text-light);
    border-top:1px solid rgba(200,170,140,0.15);
  }
  .site-footer a{color:var(--soft-orange);text-decoration:none}

  /* ========== RESPONSIVE ========== */
  @media(max-width:640px){
    .hero{padding:40px 16px 30px}
    .quote-card{padding:16px 20px}
    .tabs-section{padding:0 12px}
    .tab-btn{padding:10px 16px;font-size:0.85rem}
    .news-card{padding:20px}
    .cards-grid{gap:14px}
    .fab-refresh{width:52px;height:52px;bottom:20px;right:20px;font-size:1.2rem}
    .mood-btn{min-width:68px;padding:10px 12px}
    .mood-section{padding:0 12px}
  }

  /* ========== SCROLL REVEAL ========== */
  .reveal{opacity:0;transform:translateY(24px);transition:all 0.7s cubic-bezier(0.4,0,0.2,1)}
  .reveal.visible{opacity:1;transform:translateY(0)}

  /* ========== RSS SOURCE INDICATOR ========== */
  .source-indicator{
    text-align:center;
    padding:8px 16px;
    font-size:0.75rem;
    color:var(--text-light);
    margin-bottom:16px;
  }
  .source-dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;
    vertical-align:middle;
  }
  .source-dot.live{background:#6BCB77;animation:dotPulse 2s infinite}
  .source-dot.cached{background:var(--gold)}
  @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* ========== EMPTY STATE ========== */
  .empty-state{
    text-align:center;padding:60px 20px;
    color:var(--text-light);
  }
  .empty-state .empty-icon{font-size:3rem;margin-bottom:12px}
  .empty-state p{font-size:0.95rem}

  /* ========== NOTIFICATION SETTINGS PANEL ========== */
  .notif-trigger{
    position:fixed;top:20px;right:20px;z-index:200;
    width:48px;height:48px;border-radius:50%;border:none;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 4px 20px rgba(120,80,40,0.12);
    cursor:pointer;transition:all 0.3s ease;
    display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;
  }
  .notif-trigger:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(120,80,40,0.18)}
  .notif-trigger .bell-dot{
    position:absolute;top:8px;right:8px;
    width:10px;height:10px;border-radius:50%;
    background:#FF6B6B;border:2px solid #fff;
    display:none;
  }
  .notif-trigger .bell-dot.active{display:block;animation:dotBlink 2s ease-in-out infinite}
  @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.3}}

  .notif-panel{
    position:fixed;top:80px;right:20px;z-index:200;
    width:340px;max-width:calc(100vw - 32px);
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-radius:var(--radius);
    box-shadow:0 12px 48px rgba(80,50,20,0.15);
    border:1px solid rgba(200,170,140,0.2);
    padding:0;
    transform:translateY(-12px) scale(0.96);
    opacity:0;visibility:hidden;
    transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow:hidden;
  }
  .notif-panel.open{
    transform:translateY(0) scale(1);
    opacity:1;visibility:visible;
  }
  .notif-panel-header{
    padding:20px 24px 16px;
    border-bottom:1px solid rgba(200,170,140,0.12);
    display:flex;align-items:center;justify-content:space-between;
  }
  .notif-panel-header h3{
    font-family:'ZCOOL XiaoWei',serif;
    font-size:1.1rem;color:var(--text-primary);
    display:flex;align-items:center;gap:8px;
  }
  .notif-close{
    width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(200,170,140,0.1);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;color:var(--text-light);
    transition:all 0.2s ease;
  }
  .notif-close:hover{background:rgba(200,170,140,0.2);color:var(--text-primary)}
  .notif-panel-body{padding:20px 24px 24px}

  .notif-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:18px;
  }
  .notif-row:last-child{margin-bottom:0}
  .notif-row-label{
    font-size:0.9rem;color:var(--text-secondary);
    display:flex;align-items:center;gap:6px;
  }
  .notif-row-label .nr-icon{font-size:1.1rem}

  /* Toggle switch */
  .toggle-wrap{
    position:relative;width:50px;height:28px;
  }
  .toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
  .toggle-track{
    position:absolute;inset:0;
    background:#DDD5CC;
    border-radius:14px;
    cursor:pointer;
    transition:background 0.3s ease;
  }
  .toggle-track::after{
    content:'';
    position:absolute;top:3px;left:3px;
    width:22px;height:22px;border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .toggle-wrap input:checked + .toggle-track{
    background:linear-gradient(135deg,#FFB87A,#FF9A5C);
  }
  .toggle-wrap input:checked + .toggle-track::after{
    transform:translateX(22px);
  }

  /* Time picker */
  .time-picker{
    display:flex;align-items:center;gap:4px;
  }
  .time-select{
    padding:6px 10px;
    border:1.5px solid rgba(200,170,140,0.3);
    border-radius:10px;
    background:rgba(255,255,255,0.9);
    font-family:'Noto Serif SC',serif;
    font-size:0.88rem;
    color:var(--text-primary);
    cursor:pointer;
    transition:border-color 0.2s ease;
    -webkit-appearance:none;
    appearance:none;
    min-width:60px;
    text-align:center;
  }
  .time-select:focus{outline:none;border-color:var(--soft-orange)}
  .time-colon{font-weight:700;color:var(--text-light);font-size:1rem}

  /* Permission status */
  .notif-perm{
    margin-top:16px;
    padding:12px 16px;
    border-radius:var(--radius-sm);
    font-size:0.8rem;
    line-height:1.6;
    display:flex;align-items:flex-start;gap:8px;
  }

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderCards() {

// ===================== RSS FETCH =====================
async function fetchRSS() {
  const indicator = document.getElementById('sourceIndicator');
  const feeds = [
    'https://www.goodnewsnetwork.org/feed/',
    'https://www.positive.news/feed/'
  ];

  try {
    const results = await Promise.allSettled(
      feeds.map(feed =>
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=6`)
          .then(r => r.json())
      )
    );

    let rssItems = [];
    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value && r.value.items) {
        r.value.items.forEach(item => {
          const positiveKeywords = /good|hope|breakthrough|save|heal|recover|success|happy|joy|love|kind|help|miracle|cure|discover|protect|celebrate|beautiful|inspiring|amazing|peace|rescue|volunteer/i;
          if (positiveKeywords.test(item.title + ' ' + (item.description || ''))) {
            const cat = categorizeNews(item.title + ' ' + (item.description || ''));
            rssItems.push({
              cat,
              title: item.title,
              summary: stripHtml(item.description || '').slice(0, 160) + '...',
              source: item.author || extractDomain(item.link) || 'Good News',
              comment: generateComment(cat),
              link: item.link
            });
          }
        });
      }
    });

    if (rssItems.length > 0) {
      const combined = shuffleArray([...allNews, ...rssItems.slice(0, 6)]);
      displayedNews = combined;
      indicator.innerHTML = '<span class="source-dot live"></span> 已连接实时好消息源';
    } else {
      displayedNews = shuffleArray([...allNews]);
    }
  } catch (e) {
    displayedNews = shuffleArray([...allNews]);
  }

  renderCards();
}

function categorizeNews(text) {
  const t = text.toLowerCase();
  const techWords = /tech|science|research|discover|ai|robot|space|energy|solar|quantum|gene|vaccine|medical|brain|crispr|nasa|engineer|battery|electric|drug|therapy|cancer|cure/;
  const cultureWords = /art|music|museum|film|festival|dance|paint|heritage|cultur|book|theater|photograph|design|fashion|literature|poetry|architect/;
  if (techWords.test(t)) return 'tech';
  if (cultureWords.test(t)) return 'culture';
  return 'warmth';
}

function generateComment(cat) {
  const comments = {
    warmth: ["世界因善意而闪闪发光。","每一份温暖都值得被看见。","爱在传递中变得更加强大。"],
    tech: ["科技的力量正在让不可能变为可能。","人类的智慧永远值得期待。","每一次突破都在重塑未来。"],
    culture: ["美好的创造让生活充满意义。","艺术是灵魂深处的光。","文化是人类最温柔的力量。"]
  };
  const arr = comments[cat] || comments.warmth;
  return arr[Math.floor(Math.random() * arr.length)];
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return ''; }
}

// ===================== SCROLL REVEAL =====================
function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// ===================== NOTIFICATION SYSTEM =====================
const NOTIF_STORAGE_KEY = 'goodNewsNotifSettings';
const NOTIF_HISTORY_KEY = 'goodNewsNotifHistory';
const NOTIF_LAST_PUSH_KEY = 'goodNewsLastPush';

let notifSettings = {
  browserEnabled: false,
  inpageEnabled: true,
  hour: 8,
  min: 0
};

function loadNotifSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(NOTIF_STORAGE_KEY));
    if (saved) notifSettings = { ...notifSettings, ...saved };
  } catch {}
  // Reflect in UI
  document.getElementById('toggleBrowser').checked = notifSettings.browserEnabled;
  document.getElementById('toggleInpage').checked = notifSettings.inpageEnabled;
  document.getElementById('notifHour').value = notifSettings.hour;
  document.getElementById('notifMin').value = notifSettings.min;
  updateBellDot();
  updatePermStatus();
}

function saveNotifSettings() {
  notifSettings.hour = parseInt(document.getElementById('notifHour').value);
  notifSettings.min = parseInt(document.getElementById('notifMin').value);
  localStorage.setItem(NOTIF_STORAGE_KEY, JSON.stringify(notifSettings));
  updateBellDot();
  syncSettingsToSW();
}

// Sync settings to Service Worker so it can push in the background
function syncSettingsToSW() {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'UPDATE_NOTIF_SETTINGS',
      settings: notifSettings
    });
  }
}

function updateBellDot() {
  const dot = document.getElementById('bellDot');
  dot.classList.toggle('active', notifSettings.browserEnabled || notifSettings.inpageEnabled);
}

function toggleNotifPanel() {
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('open');
}

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('notifPanel');
  const trigger = document.getElementById('notifTrigger');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !trigger.contains(e.target)) {
    panel.classList.remove('open');
  }
});

function handleBrowserToggle(checked) {
  if (checked) {
    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        notifSettings.browserEnabled = true;
        saveNotifSettings();
        updatePermStatus();
        showToast(getRandomNews(), '浏览器通知已开启，明天按时提醒你');
      } else if (Notification.permission === 'denied') {
        document.getElementById('toggleBrowser').checked = false;
        notifSettings.browserEnabled = false;
        saveNotifSettings();
        updatePermStatus();
      } else {
        requestNotifPermission();
      }
    } else {
      document.getElementById('toggleBrowser').checked = false;
      notifSettings.browserEnabled = false;
      saveNotifSettings();
      updatePermStatus();
    }
  } else {
    notifSettings.browserEnabled = false;
    saveNotifSettings();
    updatePermStatus();
  }
}

function handleInpageToggle(checked) {
  notifSettings.inpageEnabled = checked;
  saveNotifSettings();
}

async function requestNotifPermission() {
  if (!('Notification' in window)) {
    updatePermStatus();
    return;
  }
  try {
    const result = await Notification.requestPermission();
    if (result === 'granted') {
      notifSettings.browserEnabled = true;
      document.getElementById('toggleBrowser').checked = true;
      saveNotifSettings();
      // Show a welcome notification
      new Notification('每日好消息 🌅', {
        body: '通知已开启！每天按时给你送来好消息。',
        icon: './icon-192.png'
      });
    } else {
      notifSettings.browserEnabled = false;
      document.getElementById('toggleBrowser').checked = false;
      saveNotifSettings();
    }
  } catch {
    notifSettings.browserEnabled = false;
    document.getElementById('toggleBrowser').checked = false;
    saveNotifSettings();
  }
  updatePermStatus();
}

function updatePermStatus() {
  const el = document.getElementById('notifPerm');
  const text = document.getElementById('notifPermText');
  const btn = document.getElementById('notifPermBtn');

  if (!('Notification' in window)) {
    el.className = 'notif-perm denied';
    text.textContent = '你的浏览器不支持通知功能，但页面内通知仍然可用。';
    btn.style.display = 'none';
    return;
  }

  const perm = Notification.permission;
  if (perm === 'granted') {
    el.className = 'notif-perm granted';
    text.textContent = `通知权限已开启。好消息会在每天 ${String(notifSettings.hour).padStart(2,'0')}:${String(notifSettings.min).padStart(2,'0')} 准时送达。`;
    btn.style.display = 'none';
  } else if (perm === 'denied') {
    el.className = 'notif-perm denied';
    text.textContent = '浏览器通知权限已被拒绝。请在浏览器设置中手动开启，或使用页面内通知。';
    btn.style.display = 'none';
  } else {
    el.className = 'notif-perm default';
    text.textContent = '开启浏览器通知后，即使你不在页面上也能收到好消息提醒。';
    btn.style.display = notifSettings.browserEnabled ? 'none' : 'inline-block';
  }
}

// ===================== IN-PAGE TOAST =====================
function showToast(newsItem, subtitle) {
  const container = document.getElementById('toastContainer');
  const catIcons = { warmth: '🧡', tech: '🚀', culture: '🎨' };
  const catLabels = { warmth: '暖心故事', tech: '科技突破', culture: '文化艺术' };

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon ${newsItem.cat}">${catIcons[newsItem.cat] || '✨'}</div>
    <div class="toast-body">
      <div class="toast-label">📣 ${subtitle || '每日好消息 · ' + (catLabels[newsItem.cat] || '')}</div>
      <div class="toast-title">${newsItem.title}</div>
      <div class="toast-comment">${newsItem.comment}</div>
    </div>
    <button class="toast-dismiss" onclick="dismissToast(this.parentElement)">✕</button>
    <div class="toast-progress"><div class="toast-progress-bar"></div></div>
  `;
  toast.addEventListener('click', (e) => {
    if (e.target.classList.contains('toast-dismiss')) return;
    if (newsItem.link) window.open(newsItem.link, '_blank');
  });

  container.appendChild(toast);

  // Auto dismiss after 8s
  setTimeout(() => dismissToast(toast), 8000);
}

function dismissToast(toast) {
  if (!toast || toast.classList.contains('leaving')) return;
  toast.classList.add('leaving');
  setTimeout(() => toast.remove(), 400);
}

// ===================== NOTIFICATION HISTORY =====================
function getNotifHistory() {
  try { return JSON.parse(localStorage.getItem(NOTIF_HISTORY_KEY)) || []; }
  catch { return []; }
}

function addNotifHistory(newsItem) {
  const history = getNotifHistory();
  history.unshift({
    title: newsItem.title,
    comment: newsItem.comment,
    cat: newsItem.cat,
    time: new Date().toLocaleString('zh-CN')
  });
  // Keep last 10
  if (history.length > 10) history.length = 10;
  localStorage.setItem(NOTIF_HISTORY_KEY, JSON.stringify(history));
  renderNotifHistory();
}

function renderNotifHistory() {
  const list = document.getElementById('notifHistoryList');
  const history = getNotifHistory();
  if (history.length === 0) {
    list.innerHTML = '<div class="notif-history-empty">还没有推送记录，明天见 :)</div>';
    return;
  }
  const catIcons = { warmth: '🧡', tech: '🚀', culture: '🎨' };
  list.innerHTML = history.map(h => `
    <div class="notif-history-item">
      ${catIcons[h.cat] || '✨'} ${h.title}
      <div class="nhi-time">${h.time}</div>
    </div>
  `).join('');
}

// ===================== SCHEDULED PUSH =====================
function checkAndPush() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();

  if (h === notifSettings.hour && m === notifSettings.min) {
    // Check if already pushed today
    const todayKey = now.toDateString();
    const lastPush = localStorage.getItem(NOTIF_LAST_PUSH_KEY);
    if (lastPush === todayKey) return; // Already pushed today

    // Mark as pushed
    localStorage.setItem(NOTIF_LAST_PUSH_KEY, todayKey);

    const news = getRandomNews();
    const catLabels = { warmth: '暖心故事', tech: '科技突破', culture: '文化艺术' };

    // Browser notification
    if (notifSettings.browserEnabled && 'Notification' in window && Notification.permission === 'granted') {
      try {
        const catEmojis = { warmth: '🧡', tech: '🚀', culture: '🎨' };
        new Notification(`${catEmojis[news.cat] || '✨'} 每日好消息 · ${catLabels[news.cat] || ''}`, {
          body: `${news.title}\n\n${news.comment}`,
          icon: './icon-192.png',
          tag: 'daily-good-news',
          requireInteraction: true
        });
      } catch {}
    }

    // In-page toast
    if (notifSettings.inpageEnabled) {
      showToast(news);
    }

    // Save to history
    addNotifHistory(news);
  }
}

// Start the scheduler - check every 30 seconds
let notifInterval = setInterval(checkAndPush, 30000);

// Also show a welcome toast if first visit today
function maybeShowWelcomeToast() {
  const todayKey = new Date().toDateString();
  const lastVisit = localStorage.getItem('goodNewsLastVisit');
  localStorage.setItem('goodNewsLastVisit', todayKey);

  if (lastVisit !== todayKey && notifSettings.inpageEnabled) {
    // First visit today - show a welcome toast after loading
    setTimeout(() => {
      const news = getRandomNews();
      showToast(news, '今日推荐 · 欢迎回来');
    }, 3000);
  }
}

// ===================== SERVICE WORKER REGISTRATION =====================
let swRegistration = null;

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  try {
    swRegistration = await navigator.serviceWorker.register('./sw.js');
    console.log('[SW] Registered:', swRegistration.scope);

    // Wait for the SW to be ready, then sync settings
    navigator.serviceWorker.ready.then(() => {
      syncSettingsToSW();
    });

    // Listen for messages from the SW
    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data.type === 'NOTIFICATION_SENT') {
        // SW sent a notification in the background - refresh history
        renderNotifHistory();
      }
    });

    // Handle SW updates
    swRegistration.addEventListener('updatefound', () => {
      const newWorker = swRegistration.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated') {
          syncSettingsToSW();
        }
      });
    });
  } catch (err) {
    console.log('[SW] Registration failed:', err);
  }
}

function testNotification() {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'TEST_NOTIFICATION' });
  } else {
    // Fallback: show a direct notification
    const news = getRandomNews();
    const catEmojis = { warmth: '🧡', tech: '🚀', culture: '🎨' };
    const catLabels = { warmth: '暖心故事', tech: '科技突破', culture: '文化艺术' };
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(`${catEmojis[news.cat]} 每日好消息 · ${catLabels[news.cat]}`, {
        body: `${news.title}\n\n💬 ${news.comment}`,
        icon: './icon-192.png'
      });
    }
    showToast(news, '测试通知');
  }
}

}

// ===================== PWA INSTALL PROMPT =====================
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'inline-block';
});

async function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const result = await deferredInstallPrompt.userChoice;
  if (result.outcome === 'accepted') {
    showToast(getRandomNews(), '应用已安装，每天好消息准时送达');
    document.getElementById('installBtn').style.display = 'none';
  }
  deferredInstallPrompt = null;
}

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', init);
